name: Artifact Demo

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
        default: 'latest'
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  upload-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Write inputs to file
        run: |
          echo "image-tag=${{ inputs.image-tag }}" > output.txt
          echo "environment=${{ inputs.environment }}" >> output.txt
          echo "triggered-at=$(date)" >> output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: output.txt
